    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@200;400;700;900&family=Playfair+Display:ital,wght@0,400;0,900;1,400;1,900&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
